<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Login — Student Management System</title>
  <link rel="stylesheet" href="/css/site-chrome.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
  <div id="site-header-mount"></div>

  <main class="auth-main">
    <div class="auth-page">
      <div class="auth-card">
      <h1>Sign In</h1>
      <p class="subtitle">Student Management System</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
            minlength="1"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
            minlength="1"
          >
        </div>

        <button type="submit" class="btn-primary" id="login-btn">Log In</button>

        <div id="message" class="message" role="alert"></div>
      </form>

      <div class="footer-links">
        <p><a href="/forgot-password.html">Forgot your password?</a></p>
        <p><a href="/signup.html">Create an account</a></p>
        <p><a href="/">&larr; Back to home</a></p>
      </div>
      </div>
    </div>
  </main>

  <div id="site-footer-mount"></div>

  <script src="/js/site-chrome-data.js"></script>
  <script src="/js/site-chrome.js"></script>
  <script src="/js/chat-widget.js"></script>
  <script src="/js/auth-api.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const messageEl = document.getElementById('message');
    const loginBtn = document.getElementById('login-btn');

    function showMessage(type, text) {
      messageEl.className = 'message ' + type;
      messageEl.textContent = text;
    }

    function clearMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      clearMessage();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username) {
        showMessage('error', 'Please enter your username.');
        document.getElementById('username').focus();
        return;
      }

      if (!password) {
        showMessage('error', 'Please enter your password.');
        document.getElementById('password').focus();
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const data = await logIn(username, password);
        showMessage('success', data.message + ' Welcome, ' + data.user.username + '.');
      } catch (error) {
        showMessage('error', error.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
