<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Reset Password — Student Management System</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('auth-theme');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
  <div class="auth-page">
    <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false">
      <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
      <span class="theme-toggle__label">Dark mode</span>
    </button>

    <div class="auth-card">
      <h1>Reset Password</h1>
      <p class="subtitle">Create a new password for your account</p>

      <form id="reset-password-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
            minlength="1"
          >
        </div>

        <div class="form-group">
          <label for="reset-code">Reset Code</label>
          <input
            type="text"
            id="reset-code"
            name="reset-code"
            placeholder="Enter your reset code"
            autocomplete="off"
            required
            minlength="1"
          >
        </div>

        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Choose a new password (min. 6 characters)"
            autocomplete="new-password"
            required
            minlength="6"
          >
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm New Password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Re-enter your new password"
            autocomplete="new-password"
            required
            minlength="6"
          >
        </div>

        <button type="submit" class="btn-primary" id="reset-btn">Reset Password</button>

        <div id="message" class="message" role="alert"></div>
      </form>

      <div class="footer-links">
        <p><a href="/login.html">Back to Sign In</a></p>
        <p><a href="/">&larr; Back to home</a></p>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/chat-widget.js"></script>
  <script src="/js/auth-api.js"></script>
  <script>
    const form = document.getElementById('reset-password-form');
    const messageEl = document.getElementById('message');
    const resetBtn = document.getElementById('reset-btn');
    const usernameInput = document.getElementById('username');
    const resetCodeInput = document.getElementById('reset-code');

    (function prefillFromSession() {
      try {
        var username = sessionStorage.getItem('reset-username');
        var resetCode = sessionStorage.getItem('reset-code');
        if (username) {
          usernameInput.value = username;
        }
        if (resetCode) {
          resetCodeInput.value = resetCode;
        }
      } catch (e) {}
    })();

    function showMessage(type, text) {
      messageEl.className = 'message ' + type;
      messageEl.textContent = text;
    }

    function clearMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      clearMessage();

      const username = usernameInput.value.trim();
      const resetCode = resetCodeInput.value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!username) {
        showMessage('error', 'Please enter your username.');
        usernameInput.focus();
        return;
      }

      if (!resetCode) {
        showMessage('error', 'Please enter your reset code.');
        resetCodeInput.focus();
        return;
      }

      if (password.length < 6) {
        showMessage('error', 'Password must be at least 6 characters.');
        document.getElementById('password').focus();
        return;
      }

      if (password !== confirmPassword) {
        showMessage('error', 'Passwords do not match.');
        document.getElementById('confirm-password').focus();
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Resetting…';

      try {
        const data = await resetPassword(username, resetCode, password);
        showMessage('success', data.message);
        form.reset();
        try {
          sessionStorage.removeItem('reset-username');
          sessionStorage.removeItem('reset-code');
        } catch (e) {}
        setTimeout(function () {
          window.location.href = '/login.html';
        }, 2000);
      } catch (error) {
        showMessage('error', error.message);
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
