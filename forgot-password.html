<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Forgot Password — Student Management System</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('auth-theme');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
  <div class="auth-page">
    <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false">
      <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
      <span class="theme-toggle__label">Dark mode</span>
    </button>

    <div class="auth-card">
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your username to receive a reset code</p>

      <form id="forgot-password-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
            minlength="1"
          >
        </div>

        <button type="submit" class="btn-primary" id="forgot-btn">Send Reset Code</button>

        <div id="message" class="message" role="alert"></div>
      </form>

      <div class="footer-links">
        <p><a href="/login.html">Back to Sign In</a></p>
        <p><a href="/">&larr; Back to home</a></p>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/chat-widget.js"></script>
  <script src="/js/auth-api.js"></script>
  <script>
    const form = document.getElementById('forgot-password-form');
    const messageEl = document.getElementById('message');
    const forgotBtn = document.getElementById('forgot-btn');

    function showMessage(type, text) {
      messageEl.className = 'message ' + type;
      messageEl.textContent = text;
    }

    function clearMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      clearMessage();

      const username = document.getElementById('username').value.trim();

      if (!username) {
        showMessage('error', 'Please enter your username.');
        document.getElementById('username').focus();
        return;
      }

      forgotBtn.disabled = true;
      forgotBtn.textContent = 'Sending…';

      try {
        const data = await requestPasswordReset(username);
        showMessage('success', data.message);
        form.reset();
      } catch (error) {
        showMessage('error', error.message);
      } finally {
        forgotBtn.disabled = false;
        forgotBtn.textContent = 'Send Reset Code';
      }
    });
  </script>
</body>
</html>
