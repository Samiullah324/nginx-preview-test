<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Sunset Autopilot (Mockup)</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="mockup-banner">
    Design mockup — NGIN-0006 · Not functional · <a href="/" style="color:#ff6b35">Back to home</a>
  </div>

  <main class="signup-page">
    <div class="signup-card">
      <header class="signup-header">
        <div class="signup-logo" aria-hidden="true">S</div>
        <h1>Create your account</h1>
        <p>Get started with Sunset Autopilot in minutes</p>
      </header>

      <form class="signup-form" action="#" method="post" aria-label="Sign up form (mockup)">
        <div class="form-field">
          <label for="full-name">Full name</label>
          <input type="text" id="full-name" name="full-name" placeholder="Jane Smith" autocomplete="name">
        </div>

        <div class="form-field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email">
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password">
          <div class="password-strength" aria-hidden="true">
            <span class="active"></span>
            <span class="active"></span>
            <span></span>
            <span></span>
          </div>
          <span class="field-hint">At least 8 characters with a number and symbol</span>
        </div>

        <button type="button" class="btn-primary">Create account</button>

        <div class="divider">or continue with</div>

        <div class="social-buttons">
          <button type="button" class="btn-social">
            Continue with Google
          </button>
          <button type="button" class="btn-social">
            Continue with GitHub
          </button>
        </div>
      </form>

      <footer class="signup-footer">
        Already have an account? <a href="#">Sign in</a>
      </footer>
    </div>
  </main>
</body>
</html>
